name: Build Android APK

on:
  push:
  workflow_dispatch:   # lets you trigger a build manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Force cordova-android to use Gradle 8.7 (avoids the Gradle 9 / XmlParser error)
      CORDOVA_ANDROID_GRADLE_DISTRIBUTION_URL: https://services.gradle.org/distributions/gradle-8.7-all.zip
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Pin build-tools to 34.0.0 (remove newer ones)
        run: |
          yes | sdkmanager "platforms;android-34" "build-tools;34.0.0" || true
          yes | sdkmanager --uninstall "build-tools;35.0.0" "build-tools;35.0.1" "build-tools;36.0.0" || true
          yes | sdkmanager --licenses || true
          echo "Installed build-tools:" && ls "$ANDROID_SDK_ROOT/build-tools" || true

      - name: Install Cordova
        run: npm install -g cordova

      - name: Add Android platform
        run: cordova platform add android@13

      - name: Force SDK 34 / build-tools 34.0.0 in Cordova config
        run: |
          node -e "const fs=require('fs');const p='platforms/android/cdv-gradle-config.json';const c=JSON.parse(fs.readFileSync(p,'utf8'));c.SDK_VERSION=34;c.TARGET_SDK_VERSION=34;c.BUILDTOOLS_VERSION='34.0.0';fs.writeFileSync(p,JSON.stringify(c,null,2));console.log(c);"

      - name: Build debug APK
        run: cordova build android --verbose

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: hama-wc2026-debug-apk
          path: platforms/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

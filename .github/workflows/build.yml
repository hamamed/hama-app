name: Build Android APK

on:
  push:
  workflow_dispatch:   # lets you trigger a build manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Force cordova-android to use Gradle 8.7 (avoids the Gradle 9 / XmlParser error)
      CORDOVA_ANDROID_GRADLE_DISTRIBUTION_URL: https://services.gradle.org/distributions/gradle-8.7-all.zip
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK 34 packages
        run: |
          yes | sdkmanager "platforms;android-34" "build-tools;34.0.0" || true
          yes | sdkmanager --licenses || true

      - name: Install Cordova
        run: npm install -g cordova

      - name: Add Android platform
        run: cordova platform add android@13

      - name: Patch ALL Cordova gradle configs (bump AGP, pin SDK 34)
        run: |
          echo "=== gradle config files found ==="
          find platforms node_modules -name "cdv-gradle-config*.json" 2>/dev/null | tee /tmp/cfgs
          while read -r f; do
            [ -z "$f" ] && continue
            echo "=== $f (BEFORE) ===" ; cat "$f"
            node -e "const fs=require('fs');const p=process.argv[1];const c=JSON.parse(fs.readFileSync(p,'utf8'));c.SDK_VERSION=34;c.TARGET_SDK_VERSION=34;c.BUILDTOOLS_VERSION='34.0.0';for(const k of Object.keys(c)){if(/AGP|GRADLE_PLUGIN|PLUGIN_VERSION/i.test(k))c[k]='8.5.2';}fs.writeFileSync(p,JSON.stringify(c,null,2));console.log('=== AFTER ==='+JSON.stringify(c));" "$f"
          done < /tmp/cfgs

      - name: Build debug APK
        run: cordova build android --verbose

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: hama-wc2026-debug-apk
          path: platforms/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

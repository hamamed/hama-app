<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' gap: data: https://koydam.com; connect-src 'self' https://koydam.com; img-src 'self' https: data:; style-src 'self' 'unsafe-inline' https://koydam.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; script-src 'self' 'unsafe-inline' https://koydam.com https://cdn.jsdelivr.net" />
  <title>HAMA WC 2026</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
</head>
<body>
  <div id="app"><div class="boot"><i class="fa-solid fa-futbol fa-spin"></i></div></div>

  <!-- cordova bridge is always loaded locally from the APK -->
  <script src="cordova.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!--
    Over-the-air loader: the UI (CSS + JS) is loaded from the server so it can
    be updated by editing files on the VPS — no new APK needed. Each asset
    falls back to the copy bundled in the APK if the server can't be reached.
  -->
  <script>
    (function () {
      var REMOTE = "https://koydam.com/app/";
      var bust = "?ts=" + Date.now();          // always fetch the freshest copy

      // --- CSS: remote first, local fallback ---
      (function loadCss() {
        var l = document.createElement("link");
        l.rel = "stylesheet";
        l.href = REMOTE + "css/style.css" + bust;
        l.onerror = function () {
          var f = document.createElement("link");
          f.rel = "stylesheet"; f.href = "css/style.css";
          document.head.appendChild(f);
        };
        document.head.appendChild(l);
      })();

      // --- JS: load in order, each remote-first with a local fallback ---
      var files = ["js/i18n.js", "js/api.js", "js/app.js"];
      function loadScript(i) {
        if (i >= files.length) return;
        var done = false;
        var s = document.createElement("script");
        s.src = REMOTE + files[i] + bust;
        s.onload = function () { if (!done) { done = true; loadScript(i + 1); } };
        s.onerror = function () {
          if (done) return; done = true;
          var local = document.createElement("script");
          local.src = files[i];               // bundled copy inside the APK
          local.onload = function () { loadScript(i + 1); };
          local.onerror = function () { loadScript(i + 1); };
          document.body.appendChild(local);
        };
        document.body.appendChild(s);
      }
      loadScript(0);
    })();
  </script>
</body>
</html>
